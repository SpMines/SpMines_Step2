<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mines_Receive - Receive &amp; Track</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy1:#081427; --navy2:#0d2148; --navy3:#0a1a36;
    --glass:rgba(255,255,255,.055); --glass-brd:rgba(120,170,255,.20);
    --blue:#5b9dff; --blue2:#2f6fe6; --gold:#e8c87a;
    --ink:#eaf1ff; --muted:#9fb4d6; --ok:#5ad6a0; --warn:#e8c87a; --danger:#ff7a8a;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Jost',sans-serif;}
  body{
    min-height:100vh;color:var(--ink);padding:22px 14px 50px;
    background:
      radial-gradient(1100px 600px at 10% -10%, #14336b 0%, transparent 55%),
      radial-gradient(900px 500px at 110% 10%, #0f5e44 0%, transparent 50%),
      linear-gradient(160deg, var(--navy1), var(--navy2) 55%, var(--navy3));
    background-attachment:fixed;
  }
  .wrap{max-width:760px;margin:0 auto;}

  /* Header */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .brand{display:flex;align-items:center;gap:11px;}
  .logo{
    width:42px;height:42px;border-radius:12px;flex-shrink:0;
    background:linear-gradient(135deg,var(--blue),var(--blue2));
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;color:#fff;
    box-shadow:0 8px 24px -8px rgba(91,157,255,.7), inset 0 0 0 1px rgba(232,200,122,.35);
  }
  h1{font-size:1.4rem;font-weight:600;letter-spacing:-.2px;}
  .h-sub{font-size:.78rem;color:var(--muted);font-weight:400;}

  /* Top mode switch */
  .modes{display:flex;gap:8px;margin-bottom:18px;}
  .mode{
    flex:1;padding:12px;border:1px solid var(--glass-brd);border-radius:14px;cursor:pointer;text-align:center;
    font-size:.92rem;font-weight:600;color:var(--muted);background:rgba(8,18,40,.4);transition:.15s;
  }
  .mode:hover{border-color:rgba(91,157,255,.4);color:var(--ink);}
  .mode.active{background:linear-gradient(135deg,rgba(91,157,255,.22),rgba(47,111,230,.18));border-color:var(--blue);color:var(--ink);}

  /* Card */
  .card{
    background:var(--glass);border:1px solid var(--glass-brd);border-radius:20px;
    padding:22px 20px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    box-shadow:0 24px 60px -30px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.06);
    margin-bottom:20px;
  }
  .card-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;}
  .card-title h2{font-size:1.05rem;font-weight:600;}

  label{display:block;font-size:.78rem;font-weight:500;color:var(--muted);margin:0 0 7px 2px;}
  input{
    width:100%;padding:12px 14px;border:1px solid var(--glass-brd);border-radius:12px;
    font-size:16px;background:rgba(8,18,40,.55);color:var(--ink);transition:.18s;
  }
  input::placeholder{color:#6b80a6;}
  input:focus{outline:none;border-color:var(--blue);background:rgba(8,18,40,.85);box-shadow:0 0 0 4px rgba(91,157,255,.18);}
  .field{margin-bottom:16px;}

  /* Search / fetch row */
  .search-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
  .search-row .fld{flex:1 1 220px;min-width:170px;}
  .go-btn{
    flex:0 0 auto;padding:12px 20px;border:none;border-radius:12px;cursor:pointer;height:47px;
    background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;
    font-size:.94rem;font-weight:600;letter-spacing:.3px;transition:.18s;
    box-shadow:0 12px 28px -12px rgba(47,111,230,.8), inset 0 0 0 1px rgba(232,200,122,.3);
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .go-btn:hover{transform:translateY(-2px);}
  .go-btn:disabled{opacity:.7;cursor:not-allowed;transform:none;}
  .spin{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite;display:none;}
  .spin.show{display:inline-block;}
  @keyframes rot{to{transform:rotate(360deg);}}

  /* Badge */
  .badge{display:inline-flex;align-items:center;gap:6px;padding:5px 13px;border-radius:30px;font-size:.8rem;font-weight:600;letter-spacing:.3px;}
  .badge.ok{background:rgba(90,214,160,.14);border:1px solid rgba(90,214,160,.45);color:var(--ok);}
  .badge.warn{background:rgba(232,200,122,.14);border:1px solid rgba(232,200,122,.5);color:var(--warn);}
  .badge.pend{background:rgba(159,180,214,.12);border:1px solid rgba(159,180,214,.4);color:var(--muted);}

  .res-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin:16px 0 6px;}
  .res-oid{font-weight:600;color:var(--gold);font-size:1.05rem;letter-spacing:.4px;}
  .res-meta{font-size:.8rem;color:var(--muted);margin-bottom:14px;}
  .res-meta b{color:var(--ink);font-weight:500;}

  /* Items table (shared) */
  .itbl{width:100%;border-collapse:collapse;font-size:.86rem;}
  .itbl th{
    text-align:left;font-weight:600;color:var(--blue);font-size:.72rem;letter-spacing:.4px;
    text-transform:uppercase;padding:8px 8px;border-bottom:1px solid var(--glass-brd);
  }
  .itbl td{padding:9px 8px;border-bottom:1px solid rgba(120,170,255,.1);vertical-align:middle;}
  .itbl td.num,.itbl th.num{text-align:center;white-space:nowrap;}
  .itbl tr:last-child td{border-bottom:none;}
  .it-name{color:var(--ink);}
  .rcv-in{width:74px;padding:8px 6px;text-align:center;font-size:15px;border-radius:9px;
    background:rgba(8,18,40,.7);border:1px solid var(--glass-brd);color:var(--ink);}
  .rcv-in:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(91,157,255,.18);}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.72rem;font-weight:600;}
  .pill.ok{background:rgba(90,214,160,.14);color:var(--ok);}
  .pill.short{background:rgba(255,122,138,.14);color:var(--danger);}

  .summary{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;}
  .sbox{flex:1 1 120px;background:rgba(8,18,40,.5);border:1px solid var(--glass-brd);border-radius:14px;padding:11px 14px;}
  .sbox .k{font-size:.72rem;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;}
  .sbox .v{font-size:1.25rem;font-weight:600;margin-top:3px;}

  .submit{
    width:100%;padding:15px;border:none;border-radius:14px;cursor:pointer;margin-top:18px;
    background:linear-gradient(135deg,var(--ok),#3fae82);color:#03251a;
    font-size:1rem;font-weight:700;letter-spacing:.3px;transition:.18s;
    box-shadow:0 12px 28px -12px rgba(90,214,160,.7);
    display:flex;align-items:center;justify-content:center;gap:9px;
  }
  .submit:hover{transform:translateY(-2px);}
  .submit:disabled{opacity:.7;cursor:not-allowed;transform:none;}

  /* Filter tabs (track) */
  .tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .tab{padding:8px 16px;border:1px solid var(--glass-brd);border-radius:30px;cursor:pointer;
    font-size:.82rem;font-weight:500;color:var(--muted);background:rgba(8,18,40,.4);transition:.15s;}
  .tab:hover{border-color:rgba(91,157,255,.4);color:var(--ink);}
  .tab.active{background:linear-gradient(135deg,rgba(91,157,255,.22),rgba(47,111,230,.18));border-color:var(--blue);color:var(--ink);}
  .tab .cnt{opacity:.7;font-size:.76rem;margin-left:5px;}

  .order{
    border:1px solid var(--glass-brd);border-radius:14px;padding:13px 15px;margin-bottom:10px;
    background:rgba(8,18,40,.4);transition:.15s;cursor:pointer;
    display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
  }
  .order:hover{border-color:rgba(91,157,255,.45);transform:translateX(2px);}
  .order .left{display:flex;flex-direction:column;gap:2px;}
  .order .oid{font-weight:600;color:var(--gold);font-size:.92rem;letter-spacing:.4px;}
  .order .sub{font-size:.74rem;color:var(--muted);}

  /* Toast / loader / empty */
  .toast{margin-top:14px;padding:13px 15px;border-radius:12px;font-size:.88rem;font-weight:500;display:none;}
  .toast.show{display:block;animation:pop .3s ease;}
  .toast.ok{background:rgba(90,214,160,.12);border:1px solid rgba(90,214,160,.4);color:var(--ok);}
  .toast.err{background:rgba(255,122,138,.12);border:1px solid rgba(255,122,138,.4);color:var(--danger);}
  @keyframes pop{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .recent-wrap{position:relative;min-height:70px;}
  .loader{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
    background:rgba(8,18,40,.35);backdrop-filter:blur(2px);border-radius:14px;z-index:5;}
  .loader.hide{display:none;}
  .ring{width:34px;height:34px;border:3.5px solid rgba(91,157,255,.25);border-top-color:var(--blue);border-radius:50%;animation:rot .8s linear infinite;}
  .loader p{font-size:.82rem;color:var(--muted);}
  .empty{text-align:center;color:var(--muted);font-size:.86rem;padding:22px 0;}
  .hidden{display:none;}
  .foot{text-align:center;margin-top:20px;font-size:.72rem;color:#6b80a6;}

  @media (max-width:480px){
    h1{font-size:1.22rem;}
    .card{padding:18px 15px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="logo">SP</div>
      <div>
        <h1>Receive &amp; Track</h1>
        <div class="h-sub">SP Mines &middot; Procurement</div>
      </div>
    </div>
  </div>

  <!-- Mode switch -->
  <div class="modes">
    <div class="mode active" data-m="receive" id="m-receive">📥 Receive</div>
    <div class="mode" data-m="track" id="m-track">📊 Track Status</div>
  </div>

  <!-- ============================ RECEIVE ============================ -->
  <section id="pane-receive">
    <div class="card">
      <div class="card-title"><h2>Receive Against Order</h2></div>
      <div class="search-row">
        <div class="fld">
          <label>Order ID</label>
          <input type="text" id="rvId" placeholder="e.g. REQ-0031" autocomplete="off"
                 onkeydown="if(event.key==='Enter')Receive.fetch()">
        </div>
        <button class="go-btn" id="rvFetchBtn" type="button" onclick="Receive.fetch()">
          <span class="spin" id="rvSpin"></span><span id="rvFetchLabel">Fetch</span>
        </button>
      </div>
      <div class="toast" id="rvToast"></div>

      <div id="rvOrder" class="hidden">
        <div class="res-head">
          <span class="res-oid" id="rvOid"></span>
          <span id="rvLive"></span>
        </div>
        <div class="res-meta" id="rvReqMeta"></div>

        <table class="itbl">
          <thead><tr><th>Item</th><th class="num">Unit</th><th class="num">Ordered</th><th class="num">Received</th></tr></thead>
          <tbody id="rvItems"></tbody>
        </table>

        <div class="field" style="margin-top:16px;">
          <label>Received By (your name)</label>
          <input type="text" id="rvBy" placeholder="e.g. Achinta Mossin" autocomplete="off">
        </div>

        <button class="submit" id="rvSubmit" type="button" onclick="Receive.submit()">
          <span class="spin" id="rvSubSpin"></span><span id="rvSubLabel">✓ Log Receipt</span>
        </button>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><h2>Recent Receipts</h2><span class="h-sub">Last 10</span></div>
      <div class="recent-wrap">
        <div class="loader" id="rvLoader"><div class="ring"></div><p>Loading…</p></div>
        <div id="rvRecent"></div>
      </div>
    </div>
  </section>

  <!-- ============================ TRACK ============================ -->
  <section id="pane-track" class="hidden">
    <div class="card">
      <div class="card-title"><h2>Track an Order</h2></div>
      <div class="search-row">
        <div class="fld">
          <label>Order ID</label>
          <input type="text" id="tkId" placeholder="e.g. REQ-0031" autocomplete="off"
                 onkeydown="if(event.key==='Enter')Track.search()">
        </div>
        <button class="go-btn" id="tkBtn" type="button" onclick="Track.search()">
          <span class="spin" id="tkSpin"></span><span id="tkLabel">Track</span>
        </button>
      </div>
      <div class="toast" id="tkToast"></div>
      <div id="tkResult"></div>
    </div>

    <div class="card">
      <div class="card-title"><h2>All Orders</h2><span class="h-sub">Recent 50</span></div>
      <div class="tabs" id="tkTabs">
        <div class="tab active" data-f="all">All <span class="cnt" id="c-all"></span></div>
        <div class="tab" data-f="Partial">Partial <span class="cnt" id="c-part"></span></div>
        <div class="tab" data-f="Completed">Completed <span class="cnt" id="c-comp"></span></div>
      </div>
      <div class="recent-wrap">
        <div class="loader" id="tkLoader"><div class="ring"></div><p>Loading orders…</p></div>
        <div id="tkList"></div>
      </div>
    </div>
  </section>

  <p class="foot">Built by Somnath Karmakar &middot; SP Mines Procurement</p>
</div>

<script>
/* ============================================================================
 *  RECEIVE + TRACK — one page, two modes.
 *  Shares the same Apps Script web app as Purchase Entry / Uploader.
 *  Receive  : ?action=order  -> fetch ordered items -> action=receive -> log
 *  Track    : ?action=track  -> ordered vs received + status ; ?action=trackList
 * ========================================================================= */
const CONFIG = {
  GAS_URL: 'https://script.google.com/macros/s/AKfycbxToz1R56w707uvfhOeKLuV-9f5feRyaYhbxBB3udl80E21oBC5e322Z7zj6r1wZqyw/exec'
};

const $ = (id) => document.getElementById(id);

const Api = {
  get(qs) { return fetch(CONFIG.GAS_URL + (qs || '')).then(r => r.json()); },
  post(body) {
    return fetch(CONFIG.GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(body)
    }).then(r => r.json());
  }
};

function statusBadge(s) {
  if (s === 'Completed') return '<span class="badge ok">✅ Completed</span>';
  if (s === 'Partial')   return '<span class="badge warn">⏳ Partial</span>';
  return '<span class="badge pend">📦 Pending</span>';
}
function num(v){ const n = parseFloat(v); return isNaN(n) ? 0 : n; }
function esc(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
const Toast = {
  show(el, m, kind){ const t = $(el); t.textContent = m; t.className = 'toast show ' + kind; if (kind==='ok') setTimeout(()=>t.classList.remove('show'),4000); },
  hide(el){ $(el).classList.remove('show'); }
};

/* ============================================================================
 *  MODE SWITCH
 * ========================================================================= */
document.querySelectorAll('.mode').forEach(m => {
  m.onclick = () => {
    document.querySelectorAll('.mode').forEach(x => x.classList.remove('active'));
    m.classList.add('active');
    const mode = m.getAttribute('data-m');
    $('pane-receive').classList.toggle('hidden', mode !== 'receive');
    $('pane-track').classList.toggle('hidden', mode !== 'track');
    if (mode === 'track' && !Track._loaded) { Track._loaded = true; List.load(); }
  };
});

/* ============================================================================
 *  RECEIVE
 * ========================================================================= */
const Receive = {
  order: null,

  fetch() {
    const id = $('rvId').value.trim();
    if (!id) return Toast.show('rvToast', 'Please enter an Order ID.', 'err');
    this._busy('rvFetchBtn','rvSpin', true);
    $('rvOrder').classList.add('hidden');
    Api.get('?action=order&orderId=' + encodeURIComponent(id))
      .then(res => {
        if (!res.ok) return Toast.show('rvToast', res.error || 'Order not found.', 'err');
        Toast.hide('rvToast');
        this.order = res.order;
        this.render(res.order);
      })
      .catch(err => Toast.show('rvToast', 'Network error — check URL / access. ' + err, 'err'))
      .finally(() => this._busy('rvFetchBtn','rvSpin', false));
  },

  render(o) {
    $('rvOid').textContent = o.orderId;
    $('rvReqMeta').innerHTML =
      '<b>Requirement Receiver:</b> ' + esc(o.receiver || '—') +
      (o.receiverName ? ' &nbsp;·&nbsp; <b>Receiver Name:</b> ' + esc(o.receiverName) : '');

    $('rvItems').innerHTML = (o.items || []).map((it, i) =>
      `<tr>
        <td class="it-name">${esc(it.name)}</td>
        <td class="num">${esc(it.unit || '')}</td>
        <td class="num">${esc(String(it.qty || '0'))}</td>
        <td class="num">
          <input class="rcv-in" type="number" min="0" step="any" data-i="${i}"
                 value="${esc(String(it.qty || '0'))}" oninput="Receive.live()">
        </td>
      </tr>`
    ).join('');

    $('rvOrder').classList.remove('hidden');
    this.live();
    $('rvOrder').scrollIntoView({ behavior:'smooth', block:'nearest' });
  },

  // Live PARTIAL / COMPLETE indicator as qtys are typed.
  live() {
    const rows = [...document.querySelectorAll('#rvItems .rcv-in')];
    let partial = false;
    rows.forEach((inp, i) => {
      const ordered = num((this.order.items[i] || {}).qty);
      if (num(inp.value) < ordered) partial = true;
    });
    $('rvLive').innerHTML = rows.length
      ? (partial ? '<span class="badge warn">⏳ Partial</span>' : '<span class="badge ok">✅ Complete</span>')
      : '';
  },

  submit() {
    if (!this.order) return;
    const receivedBy = $('rvBy').value.trim();
    if (!receivedBy) return Toast.show('rvToast', 'Please enter your name (Received By).', 'err');

    const items = this.order.items.map((it, i) => {
      const inp = document.querySelector('#rvItems .rcv-in[data-i="' + i + '"]');
      return { name: it.name, qty: it.qty, unit: it.unit, received: inp ? inp.value.trim() : '0' };
    });

    this._busy('rvSubmit','rvSubSpin', true);
    Api.post({ action:'receive', orderId: this.order.orderId, receiverName: receivedBy, items: items })
      .then(res => {
        if (!res.ok) return Toast.show('rvToast', res.error || 'Could not save.', 'err');
        const st = (res.receipt && res.receipt.status) || '';
        Toast.show('rvToast', 'Receipt logged for ' + res.receipt.orderId + (st ? ' (' + st + ').' : '.'), 'ok');
        $('rvOrder').classList.add('hidden');
        $('rvId').value = ''; $('rvBy').value = ''; this.order = null;
        Recent.load();
      })
      .catch(err => Toast.show('rvToast', 'Network error. ' + err, 'err'))
      .finally(() => this._busy('rvSubmit','rvSubSpin', false));
  },

  _busy(btn, spin, on) { $(btn).disabled = on; $(spin).classList.toggle('show', on); }
};

/* ---- Recent receipts ---------------------------------------------------- */
const Recent = {
  load() {
    $('rvLoader').classList.remove('hide');
    Api.get('?action=receipts')
      .then(res => { this.render((res.ok && res.receipts) ? res.receipts : []); })
      .catch(() => { $('rvRecent').innerHTML = '<div class="empty">Couldn\'t load.</div>'; })
      .finally(() => $('rvLoader').classList.add('hide'));
  },
  render(list) {
    const box = $('rvRecent');
    if (!list.length) { box.innerHTML = '<div class="empty">No receipts yet.</div>'; return; }
    box.innerHTML = list.map(r => {
      const time = r.receiptTime
        ? new Date(r.receiptTime).toLocaleString('en-IN', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })
        : '';
      const bad = r.status === 'Partial' ? '<span class="badge warn">⏳ Partial</span>' : '<span class="badge ok">✅ Full</span>';
      return `<div class="order">
        <div class="left">
          <span class="oid">${esc(r.orderId)}</span>
          <span class="sub">${esc(r.receiverName || '—')} · ${esc(time)}</span>
        </div>
        ${bad}
      </div>`;
    }).join('');
  }
};

/* ============================================================================
 *  TRACK  (status lookup + Partial/Completed filter)
 * ========================================================================= */
const Track = {
  _loaded: false,

  search() {
    const id = $('tkId').value.trim();
    if (!id) return Toast.show('tkToast', 'Please enter an Order ID.', 'err');
    this._busy(true);
    $('tkResult').innerHTML = '';
    Api.get('?action=track&orderId=' + encodeURIComponent(id))
      .then(res => {
        if (!res.ok) return Toast.show('tkToast', res.error || 'Order not found.', 'err');
        Toast.hide('tkToast');
        this.render(res.order);
      })
      .catch(err => Toast.show('tkToast', 'Network error. ' + err, 'err'))
      .finally(() => this._busy(false));
  },

  render(o) {
    const rows = (o.items || []).map(it => {
      const pill = it.complete
        ? '<span class="pill ok">✓ Full</span>'
        : `<span class="pill short">−${esc(String(it.short))} short</span>`;
      return `<tr>
        <td class="it-name">${esc(it.name)}</td>
        <td class="num">${esc(it.unit || '')}</td>
        <td class="num">${esc(String(it.ordered || '0'))}</td>
        <td class="num">${esc(String(it.received || '0'))}</td>
        <td class="num">${pill}</td>
      </tr>`;
    }).join('');

    const total = (o.items || []).length;
    const done  = (o.items || []).filter(i => i.complete).length;
    const time  = o.receiptTime
      ? new Date(o.receiptTime).toLocaleString('en-IN', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })
      : '—';

    $('tkResult').innerHTML = `
      <div class="res-head">
        <span class="res-oid">${esc(o.orderId)}</span>
        ${statusBadge(o.status)}
      </div>
      <div class="res-meta">
        <b>Received By:</b> ${esc(o.receiver || '—')} &nbsp;·&nbsp; <b>Last receipt:</b> ${esc(time)}
        ${o.source === 'purchase' ? ' &nbsp;·&nbsp; <i>not received yet</i>' : ''}
      </div>
      <table class="itbl">
        <thead><tr><th>Item</th><th class="num">Unit</th><th class="num">Ordered</th><th class="num">Received</th><th class="num">Status</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="5" class="empty">No items.</td></tr>'}</tbody>
      </table>
      <div class="summary">
        <div class="sbox"><div class="k">Items</div><div class="v">${total}</div></div>
        <div class="sbox"><div class="k">Fully received</div><div class="v" style="color:var(--ok)">${done}</div></div>
        <div class="sbox"><div class="k">Pending items</div><div class="v" style="color:${total-done ? 'var(--danger)' : 'var(--ok)'}">${total - done}</div></div>
      </div>`;
    $('tkResult').scrollIntoView({ behavior:'smooth', block:'nearest' });
  },

  _busy(on) { $('tkBtn').disabled = on; $('tkSpin').classList.toggle('show', on); }
};

const List = {
  all: [], filter: 'all',
  load() {
    $('tkLoader').classList.remove('hide');
    Api.get('?action=trackList')
      .then(res => { this.all = (res.ok && res.orders) ? res.orders : []; this.counts(); this.render(); })
      .catch(() => { $('tkList').innerHTML = '<div class="empty">Couldn\'t load.</div>'; })
      .finally(() => $('tkLoader').classList.add('hide'));
  },
  counts() {
    $('c-all').textContent  = this.all.length;
    $('c-part').textContent = this.all.filter(o => o.status === 'Partial').length;
    $('c-comp').textContent = this.all.filter(o => o.status === 'Completed').length;
  },
  render() {
    const box = $('tkList');
    const rows = this.filter === 'all' ? this.all : this.all.filter(o => o.status === this.filter);
    if (!rows.length) { box.innerHTML = '<div class="empty">No orders here.</div>'; return; }
    box.innerHTML = rows.map(o => {
      const time = o.receiptTime
        ? new Date(o.receiptTime).toLocaleString('en-IN', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })
        : '';
      return `<div class="order" data-oid="${esc(o.orderId)}">
        <div class="left">
          <span class="oid">${esc(o.orderId)}</span>
          <span class="sub">${esc(o.receiver || '—')} · ${esc(time)}</span>
        </div>
        ${statusBadge(o.status)}
      </div>`;
    }).join('');
    box.querySelectorAll('[data-oid]').forEach(el => {
      el.onclick = () => { $('tkId').value = el.getAttribute('data-oid'); Track.search(); window.scrollTo({ top:0, behavior:'smooth' }); };
    });
  }
};

$('tkTabs').querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    $('tkTabs').querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    List.filter = tab.getAttribute('data-f');
    List.render();
  };
});

/* ---- init --------------------------------------------------------------- */
Recent.load();   // receive tab is shown first
</script>
</body>
</html>
